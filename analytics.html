<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流量与转化监控｜亚马逊新品机会判断器</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #fff;
      --border: #d9e2ec;
      --ink: #0f172a;
      --text: #243447;
      --muted: #62748a;
      --primary: #1f6feb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin: 0;
      color: var(--ink);
      letter-spacing: 0;
    }

    h1 { font-size: 30px; }
    h2 { font-size: 18px; margin-bottom: 12px; }
    p { margin: 8px 0 0; color: var(--muted); }

    a {
      color: var(--primary);
      font-weight: 800;
      text-decoration: none;
    }

    select, button {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel, .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .kpi small {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .kpi strong {
      display: block;
      margin-top: 5px;
      color: var(--ink);
      font-size: 26px;
      line-height: 1.1;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 9px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--ink);
      background: #edf2f7;
    }

    tr:last-child td { border-bottom: 0; }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 28px;
      background: #fbfdff;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 780px) {
      header, .grid, .section-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>流量与转化监控</h1>
        <p>查看访问、上传、生成报告和教程页 CTA 的汇总数据。这里只显示聚合指标，不显示文件名、文件内容或个人信息。</p>
      </div>
      <div class="toolbar">
        <a href="/">返回工具</a>
        <select id="days">
          <option value="7">近 7 天</option>
          <option value="14" selected>近 14 天</option>
          <option value="30">近 30 天</option>
          <option value="90">近 90 天</option>
        </select>
        <button id="refreshBtn">刷新</button>
      </div>
    </header>

    <div id="content" class="empty">正在读取统计数据...</div>
  </div>

  <script>
    const content = document.getElementById("content");
    const days = document.getElementById("days");
    const refreshBtn = document.getElementById("refreshBtn");

    function fmt(value) {
      return Number(value || 0).toLocaleString("zh-CN");
    }

    function pct(value) {
      if (!Number.isFinite(value)) return "-";
      return (value * 100).toFixed(1) + "%";
    }

    function table(headers, rows, emptyText) {
      if (!rows.length) return `<p>${emptyText}</p>`;
      return `
        <table>
          <thead><tr>${headers.map(header => `<th>${header}</th>`).join("")}</tr></thead>
          <tbody>${rows.join("")}</tbody>
        </table>
      `;
    }

    async function loadStats() {
      content.className = "empty";
      content.textContent = "正在读取统计数据...";
      try {
        const res = await fetch(`/api/stats?days=${encodeURIComponent(days.value)}`, { cache: "no-store" });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "读取失败");
        const t = data.totals;
        const uploadRate = t.sessions ? t.uploads / t.sessions : 0;
        const reportRate = t.sessions ? t.reports / t.sessions : 0;
        const reportFromUploadRate = t.uploads ? t.reports / t.uploads : 0;

        content.className = "";
        content.innerHTML = `
          <div class="grid">
            <div class="kpi"><small>访问会话</small><strong>${fmt(t.sessions)}</strong></div>
            <div class="kpi"><small>页面浏览</small><strong>${fmt(t.pageViews)}</strong></div>
            <div class="kpi"><small>上传成功</small><strong>${fmt(t.uploads)}</strong></div>
            <div class="kpi"><small>报告生成</small><strong>${fmt(t.reports)}</strong></div>
            <div class="kpi"><small>访问到上传转化</small><strong>${pct(uploadRate)}</strong></div>
            <div class="kpi"><small>上传到报告转化</small><strong>${pct(reportFromUploadRate)}</strong></div>
          </div>

          <div class="section-grid">
            <section class="panel">
              <h2>事件排行</h2>
              ${table(["事件", "次数"], data.events.map(row => `<tr><td>${row.name}</td><td>${fmt(row.count)}</td></tr>`), "暂无事件数据。")}
            </section>
            <section class="panel">
              <h2>页面访问</h2>
              ${table(["页面", "浏览"], data.pages.map(row => `<tr><td>${row.path || "/"}</td><td>${fmt(row.views)}</td></tr>`), "暂无页面数据。")}
            </section>
            <section class="panel">
              <h2>来源</h2>
              ${table(["来源", "访问"], data.sources.map(row => `<tr><td>${row.source || "direct"}</td><td>${fmt(row.visits)}</td></tr>`), "暂无来源数据。")}
            </section>
            <section class="panel">
              <h2>SEO 转化判断</h2>
              <p>访问到上传转化：${pct(uploadRate)}。报告生成转化：${pct(reportRate)}。教程页 CTA 点击：${fmt(t.helpCtaClicks)}。</p>
              <p>如果访问多但上传少，优先优化首页首屏文案和上传引导；如果上传多但报告少，优先优化样例数据、字段兼容和错误提示。</p>
            </section>
          </div>
        `;
      } catch (error) {
        content.className = "empty";
        content.textContent = "暂时没有统计数据或接口未完成部署：" + error.message;
      }
    }

    refreshBtn.addEventListener("click", loadStats);
    days.addEventListener("change", loadStats);
    loadStats();
  </script>
</body>
</html>
